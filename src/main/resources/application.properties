# Server Configuration
server.port=8081

spring.application.name=taskai_backend

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://:localhost:5432/
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Security & JWT (Set a 256-bit key in environment variables)
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# AI Services Configuration
# OpenAI for Tone Analysis
app.ai.openai.api-key=${OPENAI_API_KEY}
app.ai.openai.url=https://api.openai.com/v1/chat/completions

# ElevenLabs for Voice Synthesis
app.ai.elevenlabs.api-key=${ELEVENLABS_API_KEY}
app.ai.elevenlabs.url=https://api.elevenlabs.io/v1/text-to-speech

# File Storage (For generated .mp3 voice files)
# In production, use AWS S3. For dev, we can use local.
app.storage.location=uploads/reminders

# Async Configuration for Audio Processing
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
