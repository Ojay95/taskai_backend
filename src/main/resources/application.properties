# Server Configuration
server.port=8081

spring.application.name=taskai_backend

# Database Configuration (PostgreSQL)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Security & JWT (Set a 256-bit key in environment variables)
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# AI Services Configuration
app.ai.gemini.api-key=${GEMINI_API_KEY}
app.storage.location=uploads/audio

# Async Thread Pool (Optimized for AI Native Audio)
spring.task.execution.pool.core-size=10
spring.task.execution.pool.max-size=50
spring.task.execution.pool.queue-capacity=1000